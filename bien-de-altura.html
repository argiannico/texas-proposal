<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIEN DE ALTURA | 2026 US TOUR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap');

  @font-face {
    font-family: 'The Source';
    src: local('The Source 4 Regular'), local('TheSource4-Regular'),
         local('The Source'), local('TheSource');
    font-weight: normal;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: #0a0a0a;
    color: #e8e4df;
    font-family: 'EB Garamond', serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ===== HERO ===== */
  .hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 120%;
    object-fit: cover;
    object-position: center 40%;
    animation: slowDrift 30s ease-in-out infinite alternate;
    filter: brightness(0.7);
  }

  @keyframes slowDrift {
    0% { transform: scale(1) translateY(0); }
    100% { transform: scale(1.08) translateY(-2%); }
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,10,10,0.1) 0%,
      rgba(10,10,10,0.0) 40%,
      rgba(10,10,10,0.6) 85%,
      rgba(10,10,10,1) 100%
    );
    z-index: 1;
  }

  .hero-text {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 30px;
  }

  .hero-text h1 {
    font-family: 'The Source', 'EB Garamond', serif;
    font-size: 8vw;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 0.9;
    color: #fff;
    opacity: 0;
    transform: translateY(40px);
    animation: revealUp 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.4s;
  }

  .hero-text .divider {
    width: 50px;
    height: 1px;
    background: rgba(255,255,255,0.4);
    margin: 28px auto;
    opacity: 0;
    animation: revealUp 1.2s ease forwards 1s;
  }

  .hero-text .subtitle {
    font-family: 'The Source', 'EB Garamond', serif;
    font-size: 4vw;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    opacity: 0;
    animation: revealUp 1.2s ease forwards 1.2s;
  }

  .hero-text .year {
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.6em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-top: 14px;
    opacity: 0;
    animation: revealUp 1.2s ease forwards 1.4s;
  }

  @keyframes revealUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .scroll-line {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 80px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3));
    z-index: 2;
    opacity: 0;
    animation: revealUp 1s ease forwards 2s;
  }
  .scroll-line::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: -1px;
    width: 3px;
    height: 12px;
    background: rgba(255,255,255,0.5);
    border-radius: 2px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: translateY(0); }
    50% { opacity: 0.2; transform: translateY(-20px); }
  }

  .hero + .full-image {
    margin-top: -1px;
  }

  /* ===== FULL-BLEED IMAGE SECTIONS ===== */
  .full-image {
    position: relative;
    width: 100%;
    overflow: hidden;
    margin: 0;
    padding: 0;
    line-height: 0;
    font-size: 0;
  }

  .full-image img,
  .full-image video {
    width: 100%;
    display: block;
    margin: 0;
    padding: 0;
    vertical-align: bottom;
    border: none;
  }

  section {
    margin: 0;
    padding: 0;
    border: none;
  }

  .full-image + .full-image {
    margin-top: -1px;
  }

  .full-image .image-caption {
    position: absolute;
    bottom: 30px;
    left: 40px;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    z-index: 2;
  }

  /* ===== TEXT BREAK SECTIONS ===== */
  .text-break {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    padding: 100px 40px;
    text-align: center;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s ease, transform 1s ease;
  }

  .text-break.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .text-break p {
    font-size: 28px;
    font-style: italic;
    line-height: 1.6;
    max-width: 700px;
    color: rgba(232, 228, 223, 0.75);
    font-weight: 400;
  }

  .text-break .location {
    font-size: 13px;
    font-style: normal;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(232, 228, 223, 0.3);
    margin-top: 30px;
    display: block;
  }

  /* ===== DUAL IMAGE GRID ===== */
  .dual-image {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    padding: 4px 0;
  }

  .dual-image img {
    width: 100%;
    height: 70vh;
    object-fit: cover;
    display: block;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1s ease, transform 1s ease;
  }

  .dual-image.visible img {
    opacity: 1;
    transform: translateY(0);
  }

  .dual-image.visible img:nth-child(2) {
    transition-delay: 0.15s;
  }

  /* ===== CINEMATIC STRIP (3 images) ===== */
  .triple-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4px;
    padding: 4px 0;
  }

  .triple-strip img {
    width: 100%;
    height: 50vh;
    object-fit: cover;
    display: block;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1s ease, transform 1s ease;
  }

  .triple-strip.visible img {
    opacity: 1;
    transform: translateY(0);
  }

  .triple-strip.visible img:nth-child(2) { transition-delay: 0.1s; }
  .triple-strip.visible img:nth-child(3) { transition-delay: 0.2s; }

  /* ===== PARALLAX IMAGE ===== */
  .parallax-section {
    position: relative;
    height: 80vh;
    overflow: hidden;
  }

  .parallax-section img {
    position: absolute;
    top: -20%;
    left: 0;
    width: 100%;
    height: 140%;
    object-fit: cover;
    will-change: transform;
  }

  .parallax-section .overlay-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    background: rgba(10,10,10,0.3);
  }

  .parallax-section .overlay-text h2 {
    font-family: 'The Source', 'EB Garamond', serif;
    font-size: 7vw;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
    text-align: center;
  }

  /* ===== INFO SECTION ===== */
  .info-section {
    max-width: 700px;
    margin: 0 auto;
    padding: 120px 40px;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s ease, transform 1s ease;
  }

  .info-section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .info-section h3 {
    font-size: 13px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(232, 228, 223, 0.3);
    margin-bottom: 40px;
    font-weight: 400;
  }

  .info-section .detail-line {
    font-size: 20px;
    line-height: 2;
    color: rgba(232, 228, 223, 0.7);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 8px 0;
  }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    padding: 80px 40px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .footer p {
    font-size: 12px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(232, 228, 223, 0.2);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .hero-text h1 { font-size: 10vw; }
    .dual-image { grid-template-columns: 1fr; }
    .dual-image img { height: 60vh; }
    .triple-strip { grid-template-columns: 1fr; }
    .triple-strip img { height: 50vh; }
    .text-break p { font-size: 22px; }
    .parallax-section .overlay-text h2 { font-size: 10vw; }
  }
</style>
</head>
<body>

<!-- ===== HERO ===== -->
<section class="hero">
  <img class="hero-img" src="bien-cover.jpg" alt="Bien de Altura vineyards">
  <div class="hero-overlay"></div>
  <div class="hero-text">
    <p class="year" style="margin-top: 0; margin-bottom: 20px;">The Source</p>
    <h1>Bien de Altura</h1>
    <div class="divider"></div>
    <p class="subtitle">Carmelo Pe&ntilde;a Santana</p>
    <p class="year">2026 US Tour &nbsp;&middot;&nbsp; California &nbsp;&middot;&nbsp; New York</p>
  </div>
  <div class="scroll-line"></div>
</section>

<section class="full-image"><img src="https://thesourceimports.com/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/2024/07/Screen-Shot-2024-07-22-at-9.40.00-AM-2048x922.jpeg.webp" alt="Canary Islands wine map"></section><section class="full-image"><img src="https://thesourceimports.com/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/2024/07/Screen-Shot-2024-07-22-at-9.44.03-AM-2-2048x1005.jpeg.webp" alt="Canary Islands detail map"></section><section class="full-image"><img src="biende-map.jpg" alt="Bien de Altura - Carmelo Peña Santana vineyard map"></section><section class="full-image"><video autoplay muted loop playsinline style="width:100%;display:block;"><source src="bien-video.mp4" type="video/mp4"></video></section><section class="full-image"><img src="ikewen-5.jpg" alt="Bien de Altura terraced vineyards aerial"></section><section class="full-image"><img src="ikewen-11.jpg" alt="Bien de Altura vineyard"></section><section class="full-image"><img src="ikewen-14.jpg" alt="Bien de Altura vineyard"></section>

<!-- ===== FOOTER ===== -->
<footer class="footer">
  <p>Bien de Altura &nbsp;&middot;&nbsp; 2026</p>
</footer>

<!-- ===== JAVASCRIPT ===== -->
<script>
// Scroll-triggered reveals
(function() {
  const elements = document.querySelectorAll('.full-image, .text-break, .dual-image, .triple-strip, .info-section');
  const observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -80px 0px' });

  elements.forEach(function(el) { observer.observe(el); });
})();

// Parallax on scroll
(function() {
  const parallaxSections = document.querySelectorAll('.parallax-section');
  window.addEventListener('scroll', function() {
    parallaxSections.forEach(function(section) {
      const rect = section.getBoundingClientRect();
      const windowH = window.innerHeight;
      if (rect.top < windowH && rect.bottom > 0) {
        const progress = (windowH - rect.top) / (windowH + rect.height);
        const offset = (progress - 0.5) * 100;
        section.querySelector('img').style.transform = 'translateY(' + offset + 'px)';
      }
    });
  }, { passive: true });
})();

// Hero parallax fade
(function() {
  const heroImg = document.querySelector('.hero-img');
  const heroText = document.querySelector('.hero-text');
  window.addEventListener('scroll', function() {
    const scrollY = window.scrollY;
    const vh = window.innerHeight;
    if (scrollY < vh) {
      const progress = scrollY / vh;
      heroText.style.opacity = 1 - progress * 1.5;
      heroText.style.transform = 'translateY(' + (scrollY * 0.3) + 'px)';
      heroImg.style.transform = 'scale(' + (1 + progress * 0.1) + ') translateY(' + (scrollY * 0.15) + 'px)';
    }
  }, { passive: true });
})();
</script>

</body>
</html>
